<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AboKlar</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="assets/favicon-48.png">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<meta name="theme-color" content="#0B0F14">
<style>
  :root {
    --bg: #FAFAF8; --card: #FFFFFF; --ink: #111827; --muted: #78716C;
    --amber: #F59E0B; --amber-ink: #92400E; --border: #E7E5E4;
    --input-bg: #FFFFFF; --err: #DC2626; --ok: #059669;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0B0F14; --card: #151B23; --ink: #F5F5F4; --muted: #8A8F98;
      --amber: #FBBF24; --amber-ink: #FBBF24; --border: #2B3441;
      --input-bg: #0F141B; --err: #F87171; --ok: #34D399;
    }
  }
  html[data-theme="light"] {
    --bg: #FAFAF8; --card: #FFFFFF; --ink: #111827; --muted: #78716C;
    --amber: #F59E0B; --amber-ink: #92400E; --border: #E7E5E4;
    --input-bg: #FFFFFF; --err: #DC2626; --ok: #059669;
  }
  html[data-theme="dark"] {
    --bg: #0B0F14; --card: #151B23; --ink: #F5F5F4; --muted: #8A8F98;
    --amber: #FBBF24; --amber-ink: #FBBF24; --border: #2B3441;
    --input-bg: #0F141B; --err: #F87171; --ok: #34D399;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--ink);
    min-height: 100vh; display:flex; align-items:center; justify-content:center;
    padding: 0;
  }
  .auth-card {
    width:100%; max-width:400px; display:flex; flex-direction:column; gap:12px;
    padding:28px max(20px, env(safe-area-inset-right)) 28px max(20px, env(safe-area-inset-left));
    margin:0 auto; box-sizing:border-box;
  }
  .logo-block { text-align:center; margin-bottom:12px; }
  .logo-img { width:88px; height:88px; border-radius:20px; box-shadow:0 6px 24px rgba(0,0,0,.22); }
  .brand { font-family: Georgia,'Times New Roman',serif; font-size:34px; font-weight:700; margin-top:14px; }
  .brand .klar { color: var(--amber); font-style: italic; }
  .tagline { font-size:13px; color:var(--muted); margin-top:4px; }
  input {
    width:100%; padding:14px 16px; font-size:16px;
    border:1.5px solid var(--border); border-radius:14px;
    background:var(--input-bg); color:var(--ink); outline:none;
  }
  input:focus { border-color: var(--amber); }
  button { font-size:16px; border:none; border-radius:14px; padding:14px; cursor:pointer; font-weight:600; }
  .btn-primary { background:var(--amber); color:#1F2937; }
  .btn-secondary { background:transparent; color:var(--ink); border:1.5px solid var(--border); }
  .btn-link { background:none; color:var(--muted); font-size:14px; font-weight:400; padding:6px; }
  .divider { height:1px; background:var(--border); margin:8px 0; }
  .muted { font-size:14px; color:var(--muted); text-align:center; }
  .err { background:rgba(220,38,38,.1); color:var(--err); padding:12px 14px; border-radius:12px; font-size:14px; }
  .ok { background:rgba(5,150,105,.1); color:var(--ok); padding:12px 14px; border-radius:12px; font-size:14px; }
  .confirm-box { text-align:center; padding:12px 0; }
  .confirm-box h2 { font-size:20px; margin-bottom:10px; }
  .pw-wrap { position:relative; }
  .pw-wrap input { padding-right:52px; }
  .pw-eye {
    position:absolute; right:6px; top:50%; transform:translateY(-50%);
    background:var(--input-bg); border:1.5px solid var(--border); border-radius:10px;
    font-size:19px; padding:7px 10px; line-height:1; opacity:.9;
  }
  .pw-eye.on { border-color:var(--amber); background:rgba(245,158,11,.12); opacity:1; }
  #app { width:100%; display:flex; flex-direction:column; align-items:center; }
  .page {
    width:100%; max-width:440px; align-self:center; margin:0 auto;
    padding:14px max(18px, env(safe-area-inset-right)) 32px max(18px, env(safe-area-inset-left));
    box-sizing:border-box; overflow-x:hidden;
  }
  body { align-items:flex-start; }
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:8px 0 20px; }
  .topbar-brand { display:flex; align-items:center; gap:10px; }
  .topbar-logo { width:34px; height:34px; border-radius:9px; }
  .topbar-name { font-family:Georgia,'Times New Roman',serif; font-size:21px; font-weight:700; }
  .topbar-name .klar { color:var(--amber); font-style:italic; }
  .icon-btn { background:none; border:1.5px solid var(--border); border-radius:12px; width:40px; height:40px; font-size:18px; padding:0; color:var(--ink); }
  .greet { font-size:17px; font-weight:600; margin:4px 0 20px; }
  .home-grid { display:flex; flex-direction:row; gap:14px; }
  .home-card {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    padding:34px 12px; border-radius:24px; text-align:center; min-height:190px;
  }
  .card-idle { background:linear-gradient(135deg,#1F2937,#0B0F14); color:#F5F5F4; border:1.5px solid transparent; }
  .card-active { background:rgba(245,158,11,.12); border:1.5px solid var(--amber); color:var(--amber-ink); }
  .home-emoji { font-size:42px; }
  .home-title { font-size:21px; font-weight:800; }
  .home-hint { font-size:13.5px; opacity:.7; }
  .btn-help {
    margin-top:22px; width:100%; background:none; color:var(--muted);
    border:1.5px dashed var(--border); border-radius:16px; padding:14px; font-weight:500;
  }
  .home-logo-block { text-align:center; margin:18px 0 10px; }
  .home-logo { width:96px; height:96px; border-radius:22px; box-shadow:0 8px 28px rgba(0,0,0,.25); }
  .home-brand { font-size:32px; margin-top:12px; }
  .greet-center { text-align:center; margin-bottom:22px; }
  .home-bottom {
    display:flex; justify-content:space-between; align-items:center;
    margin-top:26px;
  }
  .btn-help-sm {
    background:none; color:var(--muted); font-size:14px; font-weight:500;
    border:1.5px dashed var(--border); border-radius:12px; padding:10px 16px;
  }
  .weather-box { margin-top:16px; }
  .weather-place {
    display:block; margin:0 auto 6px; background:none; border:none;
    color:var(--muted); font-size:13.5px; font-weight:600; padding:6px 10px;
  }
  .wday { background:none; border:none; color:var(--ink); padding:0; }
  .city-opt {
    display:block; width:100%; text-align:left; background:var(--input-bg);
    border:1.5px solid var(--border); border-radius:12px; padding:12px 14px;
    color:var(--ink); font-size:14.5px; margin-bottom:8px;
  }
  .weather-now {
    display:flex; align-items:center; justify-content:center; gap:10px;
    margin-bottom:10px;
  }
  .wnow-icon { font-size:30px; }
  .wnow-temp { font-size:26px; font-weight:800; }
  .weather-week {
    display:flex; gap:4px; justify-content:space-between;
    background:var(--card); border:1.5px solid var(--border);
    border-radius:16px; padding:12px 8px;
  }
  .wday { display:flex; flex-direction:column; align-items:center; gap:3px; flex:1; }
  .wday-name { font-size:11px; color:var(--muted); font-weight:600; }
  .wday-icon { font-size:18px; }
  .wday-max { font-size:13px; font-weight:700; }
  .wday-min { font-size:11.5px; color:var(--muted); }
  .help-sec { border:1.5px solid var(--border); border-radius:16px; margin-bottom:12px; overflow:hidden; }
  .help-sec summary {
    padding:16px; font-weight:700; font-size:16px; cursor:pointer; list-style:none;
  }
  .help-sec summary::-webkit-details-marker { display:none; }
  .help-sec summary::after { content:'▾'; float:right; color:var(--muted); transition:.2s; }
  .help-sec[open] summary::after { transform:rotate(180deg); }
  .help-steps { padding:0 16px 16px 34px; }
  .help-steps li { font-size:14.5px; line-height:1.55; margin-bottom:10px; color:var(--ink); }
  .help-steps b { color:var(--amber-ink); }
  .totals-row { display:flex; gap:12px; }
  .total-card {
    flex:1; display:flex; flex-direction:column; gap:2px;
    background:var(--card); border:1.5px solid var(--border);
    border-radius:16px; padding:14px;
  }
  .total-label { font-size:12px; color:var(--muted); display:flex; justify-content:space-between; align-items:center; }
  .total-eye { font-size:15px; opacity:.7; }
  .total-val { font-size:17px; font-weight:700; transition:filter .2s; }
  .total-val.hidden-val { filter:blur(9px); user-select:none; }
  .total-sec { font-size:13px; color:var(--muted); font-weight:600; }
  .total-card { cursor:pointer; }
  .rows { display:flex; flex-direction:column; gap:10px; }
  .row-card {
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    background:var(--card); border:1.5px solid var(--border);
    border-radius:16px; padding:14px 16px; text-align:left; color:var(--ink);
  }
  .row-main { display:flex; flex-direction:column; gap:3px; min-width:0; }
  .row-name { font-weight:700; font-size:16px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .row-cat { font-size:12.5px; color:var(--muted); }
  .row-side { display:flex; flex-direction:column; align-items:flex-end; gap:3px; flex-shrink:0; }
  .row-amount { font-weight:700; font-size:15.5px; }
  .row-sub { font-size:12px; color:var(--muted); }
  .form { display:flex; flex-direction:column; gap:12px; }
  .form-row { display:flex; gap:10px; }
  .form-row input { flex:1; }
  select {
    padding:14px 12px; font-size:16px; border:1.5px solid var(--border);
    border-radius:14px; background:var(--input-bg); color:var(--ink);
  }
  .lbl { font-size:13px; color:var(--muted); margin-bottom:-6px; }
  .seg { display:flex; gap:8px; }
  .seg-btn {
    flex:1; padding:12px; border:1.5px solid var(--border); border-radius:14px;
    background:var(--input-bg); color:var(--muted); font-weight:600;
  }
  .seg-btn.on { border-color:var(--amber); color:var(--amber-ink); background:rgba(245,158,11,.1); }
  .btn-danger {
    background:rgba(220,38,38,.1); color:var(--err);
    border:1.5px solid rgba(220,38,38,.35);
  }
  .sub-row { cursor:pointer; }
  .sub-row.off { opacity:.5; }
  .sub-icon-wrap {
    width:46px; height:46px; border-radius:13px; flex-shrink:0;
    background:var(--input-bg); border:1.5px solid var(--border);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .sub-icon-wrap.big { width:58px; height:58px; border-radius:16px; }
  .sub-logo { width:30px; height:30px; }
  .sub-icon-wrap.big .sub-logo { width:38px; height:38px; }
  .sub-letter { font-size:20px; font-weight:800; color:var(--amber); font-family:Georgia,serif; }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:7px; vertical-align:1px; }
  .dot-on { background:#22C55E; }
  .dot-off { background:#6B7280; }
  .row-actions { display:flex; gap:8px; margin-top:6px; }
  .mini-btn {
    width:38px; height:34px; font-size:15px; padding:0;
    background:var(--input-bg); border:1.5px solid var(--border); border-radius:10px;
  }
  .mini-btn.danger { border-color:rgba(220,38,38,.4); background:rgba(220,38,38,.08); }
  .modal-bg {
    position:fixed; inset:0; background:rgba(0,0,0,.6);
    display:flex; align-items:center; justify-content:center; padding:20px; z-index:50;
  }
  .modal {
    background:var(--card); border:1.5px solid var(--border); border-radius:22px;
    padding:22px; width:100%; max-width:380px; max-height:85vh; overflow-y:auto;
  }
  .modal-head { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
  .modal-title { font-size:21px; font-weight:800; }
  .modal-sub { font-size:15px; color:var(--amber-ink); font-weight:700; margin-top:2px; }
  .detail-row {
    display:flex; justify-content:space-between; gap:14px;
    padding:11px 0; border-bottom:1px solid var(--border); font-size:14.5px;
  }
  .detail-row span { color:var(--muted); }
  .detail-row b { text-align:right; }
  .detail-row a { color:var(--amber-ink); text-decoration:none; font-weight:700; }
  .modal-btns { display:flex; gap:10px; margin-top:12px; }
  .modal-btns button { flex:1; }
  .btn-paid {
    background:var(--amber); color:#1F2937; border:none; border-radius:11px;
    padding:9px 14px; font-size:14px; font-weight:700; margin-top:4px;
  }
  .grp-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
  .grp-btn { flex:1 1 45%; font-size:13.5px; padding:10px 6px; }
  .paid-row { opacity:.55; }
  .paid-badge {
    color:#22C55E; font-size:13.5px; font-weight:700; margin-top:6px;
    background:rgba(34,197,94,.12); padding:5px 10px; border-radius:9px;
  }
  .row-amount.over, .row-cat.over { color:var(--err); }
  .arch-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .arch-title { font-size:17px; font-weight:800; }
  .chat-hint { font-size:13px; color:var(--muted); margin-bottom:12px; }
  .chat-msgs { display:flex; flex-direction:column; gap:10px; min-height:80px; max-height:55vh; overflow-y:auto; margin-bottom:12px; }
  .chat-bubble { max-width:85%; padding:11px 14px; border-radius:16px; font-size:14.5px; line-height:1.5; word-break:break-word; }
  .chat-bubble.user { background:var(--amber); color:#1F2937; align-self:flex-end; border-bottom-right-radius:4px; }
  .chat-bubble.assistant { background:var(--card); border:1.5px solid var(--border); align-self:flex-start; border-bottom-left-radius:4px; }
  .chat-input-row { display:flex; gap:10px; }
  .chat-input-row input { flex:1; }
  .chat-send { padding:14px 18px; flex-shrink:0; }
  .admin-sess { background:var(--card); border:1.5px solid var(--border); border-radius:16px; padding:14px; margin-bottom:12px; }
  .admin-sess-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .admin-msgs { display:flex; flex-direction:column; gap:8px; }
  .toast {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    background:var(--card); color:var(--ink); border:1.5px solid var(--border);
    padding:12px 18px; border-radius:14px; font-size:14px; z-index:100;
    box-shadow:0 8px 24px rgba(0,0,0,.3); white-space:nowrap;
  }
  .confirm-box p { margin:6px 0; font-size:15px; }
</style>
</head>
<body data-build="56">
  <div id="app"><p style="color:var(--muted)">A carregar…</p></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js?v=56"></script>
</body>
</html>
