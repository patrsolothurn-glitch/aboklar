<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AboKlar</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="assets/favicon-48.png">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<meta name="theme-color" content="#0B0F14">
<style>
  :root {
    --bg: #FAFAF8;
    --card: #FFFFFF;
    --ink: #111827;
    --muted: #78716C;
    --amber: #F59E0B;
    --border: #E7E5E4;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0B0F14;
      --card: #151B23;
      --ink: #F5F5F4;
      --muted: #8A8F98;
      --amber: #FBBF24;
      --border: #2B3441;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    text-align: center;
    max-width: 340px;
  }
  .card img {
    width: 120px;
    height: 120px;
    border-radius: 27px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.25);
  }
  h1 {
    margin-top: 24px;
    font-size: 42px;
    font-weight: 700;
  }
  h1 .klar { color: var(--amber); font-style: italic; }
  p.tag {
    margin-top: 8px;
    font-family: system-ui, sans-serif;
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.3px;
  }
  p.soon {
    margin-top: 32px;
    font-family: system-ui, sans-serif;
    font-size: 13px;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 999px;
    display: inline-block;
    padding: 8px 18px;
  }
</style>
</head>
<body>
  <div class="card">
    <img src="assets/icon-512.png" alt="AboKlar">
    <h1>Abo<span class="klar">Klar</span></h1>
    <p class="tag">Subscrições e faturas, claro.</p>
    <p class="soon">🚧 Em construção — build 1</p>
  </div>
</body>
</html>
